<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>星际塔防</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#03050f;color:#e0f0ff;font-family:'Segoe UI',sans-serif;overflow:hidden;user-select:none;}
#gc{display:flex;flex-direction:column;height:100vh;width:100vw;position:relative;}
#hud{width:100%;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#060c1e;border-bottom:1px solid #1a3a6a;flex-shrink:0;flex-wrap:wrap;gap:6px;}
.hi{display:flex;align-items:center;gap:5px;font-size:13px;color:#7ac8ff;}
.hv{color:#fff;font-weight:700;min-width:32px;text-align:right;}
.hbtn{font-size:11px;font-weight:700;padding:5px 14px;border:none;border-radius:4px;color:#fff;cursor:pointer;letter-spacing:1px;transition:all .2s;}
#wbtn{background:linear-gradient(135deg,#0055cc,#0088ff);box-shadow:0 0 12px #0066ff88;}
#wbtn:hover{background:linear-gradient(135deg,#0077ff,#00aaff);}
#wbtn:disabled{opacity:.4;cursor:not-allowed;}
#sbtn{background:linear-gradient(135deg,#005544,#008866);}
#main{display:flex;flex:1;overflow:hidden;}
#cv{display:block;flex-shrink:0;background:#040b1a;cursor:crosshair;}
#sb{width:150px;flex-shrink:0;background:#060c1e;border-left:1px solid #1a3a6a;display:flex;flex-direction:column;padding:8px 6px;gap:6px;overflow-y:auto;}
.st{font-size:9px;letter-spacing:2px;color:#4a80c0;text-align:center;padding-bottom:5px;border-bottom:1px solid #1a3a6a;}
.tc{background:#0a1428;border:1px solid #1a3a6a;border-radius:5px;padding:7px;cursor:pointer;transition:all .15s;}
.tc:hover{border-color:#3a7aff;background:#0d1e40;}
.tc.sel{border-color:#00ccff;background:#0d2050;box-shadow:0 0 12px #00ccff33;}
.tc.dis{opacity:.4;cursor:not-allowed;}
.th{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.te{font-size:20px;}
.tn{font-size:9px;color:#7ac8ff;letter-spacing:.5px;}
.tc2{font-size:12px;color:#ffd700;font-weight:600;}
.ts{font-size:10px;color:#5a7aaa;line-height:1.5;}
.ts span{color:#8ab8e0;}
#sell{width:100%;font-size:9px;padding:6px;background:#1a0808;border:1px solid #6a1a1a;border-radius:4px;color:#ff6666;cursor:pointer;letter-spacing:1px;transition:all .15s;margin-top:auto;}
#sell:hover:not(:disabled){background:#2a1010;border-color:#ff3333;}
#sell:disabled{opacity:.3;cursor:not-allowed;}
#ov{position:absolute;inset:0;background:rgba(2,5,15,.9);display:flex;align-items:center;justify-content:center;z-index:50;}
#ov.h{display:none;}
.ob{background:#060c1e;border:2px solid #1a4aaa;border-radius:10px;padding:30px 40px;text-align:center;box-shadow:0 0 50px #0055cc44;}
.ot{font-size:28px;font-weight:900;margin-bottom:10px;letter-spacing:2px;}
.ot.w{color:#00ff88;text-shadow:0 0 16px #00ff88;}
.ot.l{color:#ff4444;text-shadow:0 0 16px #ff4444;}
.ot.s{color:#00aaff;text-shadow:0 0 16px #00aaff;}
.os{color:#6a9acc;font-size:14px;margin-bottom:22px;}
.obtn{font-size:13px;font-weight:700;padding:10px 28px;background:linear-gradient(135deg,#0055cc,#0088ff);border:none;border-radius:5px;color:#fff;cursor:pointer;letter-spacing:1px;box-shadow:0 0 16px #0066ff88;}
.obtn:hover{box-shadow:0 0 26px #0088ffcc;transform:scale(1.03);}
.tips{margin-top:18px;color:#3a5a8a;font-size:12px;line-height:1.8;text-align:left;}
.tips li{list-style:none;}
.tips li::before{content:"▸ ";color:#0088ff;}
</style>
</head>
<body>
<div id="gc">
  <div id="hud">
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <div class="hi">💰 金币<span class="hv" id="gv">200</span></div>
      <div class="hi">❤️ 基地<span class="hv" id="lv">20</span></div>
      <div class="hi">🌊 波次<span class="hv" id="wv">0/20</span></div>
      <div class="hi">👾 敌人<span class="hv" id="ev">0</span></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="hbtn" id="wbtn" onclick="sendWave()">▶ 发起进攻</button>
      <button class="hbtn" id="sbtn" onclick="toggleSpeed()">⚡ 加速</button>
    </div>
  </div>
  <div id="main">
    <canvas id="cv"></canvas>
    <div id="sb">
      <div class="st">建造炮塔</div>
      <div class="tc" id="c-gun" onclick="selT('gun')">
        <div class="th"><span class="te">🔫</span><span class="tn">机枪塔</span></div>
        <div class="tc2">💰 60</div>
        <div class="ts">伤害:<span>15</span> 射程:<span>中</span></div>
      </div>
      <div class="tc" id="c-cannon" onclick="selT('cannon')">
        <div class="th"><span class="te">💣</span><span class="tn">炮弹塔</span></div>
        <div class="tc2">💰 100</div>
        <div class="ts">伤害:<span>50</span> 范围<span>爆炸</span></div>
      </div>
      <div class="tc" id="c-laser" onclick="selT('laser')">
        <div class="th"><span class="te">⚡</span><span class="tn">激光塔</span></div>
        <div class="tc2">💰 150</div>
        <div class="ts">持续<span>伤害</span> 射程:<span>远</span></div>
      </div>
      <div class="tc" id="c-missile" onclick="selT('missile')">
        <div class="th"><span class="te">🚀</span><span class="tn">导弹塔</span></div>
        <div class="tc2">💰 200</div>
        <div class="ts">伤害:<span>120</span> 追踪</div>
      </div>
      <div class="tc" id="c-freeze" onclick="selT('freeze')">
        <div class="th"><span class="te">❄️</span><span class="tn">冰冻塔</span></div>
        <div class="tc2">💰 120</div>
        <div class="ts">减速<span>60%</span> 范围</div>
      </div>
      <button id="sell" disabled onclick="sellSel()">🗑 出售炮塔</button>
    </div>
  </div>
  <div id="ov">
    <div class="ob">
      <div class="ot s">⭐ 星际塔防</div>
      <div class="os">保卫星球，抵御入侵者！</div>
      <button class="obtn" onclick="startGame()">开 始 游 戏</button>
      <ul class="tips">
        <li>右侧选炮塔，点空地建造</li>
        <li>点已建炮塔可出售(60%返还)</li>
        <li>共20波，每波结束有奖励</li>
        <li>❄️冰冻+💣炮弹配合效果好</li>
      </ul>
    </div>
  </div>
</div>
<script>
const COLS=20,ROWS=14;
let CELL=40;
const WAYPTS=[[0,2],[4,2],[4,6],[8,6],[8,1],[13,1],[13,10],[17,10],[17,4],[20,4]];
const TDEFS={
  gun:    {name:'机枪塔',emoji:'🔫',cost:60, dmg:15, rate:.12,range:2.5,color:'#4af',btype:'bullet',bspd:5},
  cannon: {name:'炮弹塔',emoji:'💣',cost:100,dmg:50, rate:.4, range:2.8,color:'#fa4',btype:'bullet',bspd:4,splash:.7},
  laser:  {name:'激光塔',emoji:'⚡',cost:150,dmg:30, rate:.016,range:3.5,color:'#f0f',btype:'laser'},
  missile:{name:'导弹塔',emoji:'🚀',cost:200,dmg:120,rate:.6, range:4.5,color:'#f84',btype:'bullet',bspd:3.5,homing:true},
  freeze: {name:'冰冻塔',emoji:'❄️',cost:120,dmg:5,  rate:.5, range:2.5,color:'#8ef',btype:'bullet',bspd:4,slow:.6,splash:.8},
};
const EDEFS={
  normal:{hp:80, spd:1.2,reward:10,color:'#e44',rad:.35,emoji:'👾'},
  fast:  {hp:50, spd:2.2,reward:15,color:'#4e4',rad:.25,emoji:'🐍'},
  heavy: {hp:250,spd:.7, reward:25,color:'#f80',rad:.45,emoji:'🤖'},
  boss:  {hp:800,spd:.5, reward:80,color:'#c0f',rad:.55,emoji:'👹'},
};

let cv,ctx,gold=200,lives=20,wave=0,TOTAL=20;
let waveOn=false,dead=false,started=false;
let selType=null,selTower=null,gspeed=1;
let grid=[],path=[],towers=[],enemies=[],bullets=[],parts=[];
let lastT=0,spawnQ=[],spawnTmr=0,mCol=-1,mRow=-1;

function init(){
  cv=document.getElementById('cv');
  ctx=cv.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  cv.addEventListener('click',onClick);
  cv.addEventListener('mousemove',e=>{
    const r=cv.getBoundingClientRect();
    mCol=Math.floor((e.clientX-r.left)/CELL);
    mRow=Math.floor((e.clientY-r.top)/CELL);
  });
}

function resize(){
  const hudH=document.getElementById('hud').offsetHeight;
  const sbW=150;
  const maxW=window.innerWidth-sbW;
  const maxH=window.innerHeight-hudH;
  CELL=Math.floor(Math.min(maxW/COLS,maxH/ROWS));
  cv.width=CELL*COLS; cv.height=CELL*ROWS;
  buildPath();
  if(started)draw();
}

function buildPath(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]={walk:false,tower:null};}
  path=[];
  for(let i=0;i<WAYPTS.length-1;i++){
    const[c0,r0]=WAYPTS[i],[c1,r1]=WAYPTS[i+1];
    const dc=Math.sign(c1-c0),dr=Math.sign(r1-r0);
    let c=c0,r=r0;
    while(c!==c1||r!==r1){
      if(r>=0&&r<ROWS&&c>=0&&c<COLS){grid[r][c].walk=true;path.push({x:c*CELL+CELL/2,y:r*CELL+CELL/2});}
      c+=dc;r+=dr;
    }
  }
  const[lc,lr]=WAYPTS[WAYPTS.length-1];
  if(lr>=0&&lr<ROWS&&lc>=0&&lc<COLS){grid[lr][lc].walk=true;path.push({x:lc*CELL+CELL/2,y:lr*CELL+CELL/2});}
  path=path.filter((p,i)=>i===0||p.x!==path[i-1].x||p.y!==path[i-1].y);
}

function startGame(){
  started=true;dead=false;gold=200;lives=20;wave=0;
  towers=[];enemies=[];bullets=[];parts=[];
  selType=null;selTower=null;waveOn=false;gspeed=1;
  document.getElementById('ov').classList.add('h');
  document.getElementById('sbtn').textContent='⚡ 加速';
  updateHUD();
  lastT=performance.now();
  requestAnimationFrame(loop);
}

function sendWave(){
  if(waveOn||dead||wave>=TOTAL)return;
  wave++;waveOn=true;
  document.getElementById('wbtn').disabled=true;
  buildQ();
}

function toggleSpeed(){
  gspeed=gspeed===1?3:1;
  document.getElementById('sbtn').textContent=gspeed===1?'⚡ 加速':'🐢 减速';
}

function buildQ(){
  spawnQ=[];
  const base=Math.floor(8+wave*2.5);
  const fast=Math.floor(wave/4),heavy=Math.floor(wave/5),boss=wave%5===0?1:0;
  for(let i=0;i<base;i++){
    let t='normal';
    if(i<boss)t='boss';
    else if(i<boss+heavy)t='heavy';
    else if(i<boss+heavy+fast)t='fast';
    spawnQ.push(t);
  }
  spawnQ.sort(()=>Math.random()-.5);
  spawnTmr=0;
}

function selT(type){
  selType=type;selTower=null;
  document.getElementById('sell').disabled=true;
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('sel'));
  document.getElementById('c-'+type).classList.add('sel');
}

function sellSel(){
  if(!selTower)return;
  const d=TDEFS[selTower.type];
  gold+=Math.floor(d.cost*.6);
  grid[selTower.row][selTower.col].tower=null;
  towers=towers.filter(t=>t!==selTower);
  selTower=null;document.getElementById('sell').disabled=true;updateHUD();
}

function onClick(e){
  if(!started||dead)return;
  const r=cv.getBoundingClientRect();
  const col=Math.floor((e.clientX-r.left)/CELL);
  const row=Math.floor((e.clientY-r.top)/CELL);
  if(row<0||row>=ROWS||col<0||col>=COLS)return;
  const cell=grid[row][col];
  if(cell.tower){
    selType=null;document.querySelectorAll('.tc').forEach(c=>c.classList.remove('sel'));
    selTower=cell.tower;document.getElementById('sell').disabled=false;return;
  }
  if(selType&&!cell.walk&&!cell.tower){
    const d=TDEFS[selType];
    if(gold<d.cost){flash();return;}
    gold-=d.cost;
    const t={type:selType,col,row,x:col*CELL+CELL/2,y:row*CELL+CELL/2,cd:0,target:null,laser:null};
    towers.push(t);cell.tower=t;updateHUD();
    spawnPs(t.x,t.y,d.color,8);
  }else{selTower=null;document.getElementById('sell').disabled=true;selType=null;document.querySelectorAll('.tc').forEach(c=>c.classList.remove('sel'));}
}

function flash(){const el=document.getElementById('gv');el.style.color='#f44';setTimeout(()=>el.style.color='#fff',300);}

function updateHUD(){
  document.getElementById('gv').textContent=gold;
  document.getElementById('lv').textContent=lives;
  document.getElementById('wv').textContent=wave+'/'+TOTAL;
  document.getElementById('ev').textContent=enemies.length+spawnQ.length;
  for(const[k,d]of Object.entries(TDEFS)){const c=document.getElementById('c-'+k);if(c)c.classList.toggle('dis',gold<d.cost);}
}

function spawnE(type){
  const d=EDEFS[type],sc=1+wave*.08;
  enemies.push({type,pi:0,x:path[0].x,y:path[0].y,hp:d.hp*sc,mhp:d.hp*sc,spd:d.spd*CELL/60,reward:d.reward,color:d.color,rad:d.rad*CELL,emoji:d.emoji,st:0,sf:1});
}

function upEnemies(dt){
  spawnTmr-=dt*gspeed;
  if(spawnTmr<=0&&spawnQ.length>0){spawnE(spawnQ.shift());spawnTmr=Math.max(.15,.55-wave*.015);}
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.st>0){e.st-=dt*gspeed;if(e.st<=0)e.sf=1;}
    const spd=e.spd*e.sf*gspeed;
    if(e.pi<path.length-1){
      const tg=path[e.pi+1],dx=tg.x-e.x,dy=tg.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<spd){e.x=tg.x;e.y=tg.y;e.pi++;}else{e.x+=dx/dist*spd;e.y+=dy/dist*spd;}
    }else{lives=Math.max(0,lives-1);spawnPs(e.x,e.y,'#f44',8);enemies.splice(i,1);updateHUD();if(lives<=0)endGame(false);continue;}
    if(e.hp<=0){gold+=e.reward;spawnPs(e.x,e.y,e.color,10);enemies.splice(i,1);updateHUD();}
  }
  if(waveOn&&spawnQ.length===0&&enemies.length===0){
    waveOn=false;gold+=20+wave*5;updateHUD();
    if(wave>=TOTAL){endGame(true);return;}
    document.getElementById('wbtn').disabled=false;
  }
}

function upTowers(dt){
  for(const t of towers){
    const d=TDEFS[t.type];
    t.cd=Math.max(0,t.cd-dt*gspeed);
    const range=d.range*CELL;
    let best=null;
    for(const e of enemies){const dx=e.x-t.x,dy=e.y-t.y;if(Math.sqrt(dx*dx+dy*dy)<=range&&e.pi>(best?best.pi:-1))best=e;}
    t.target=best;t.laser=null;
    if(!best||t.cd>0)continue;
    if(d.btype==='laser'){
      t.laser=best;best.hp-=d.dmg*dt*gspeed;
      spawnP(t.x+(best.x-t.x)*.7,t.y+(best.y-t.y)*.7,d.color,2);
    }else{
      t.cd=d.rate;
      bullets.push({x:t.x,y:t.y,tx:best.x,ty:best.y,target:best,spd:d.bspd*CELL/60,dmg:d.dmg,color:d.color,splash:d.splash||0,slow:d.slow||0,homing:d.homing||false,r:CELL*.12});
    }
  }
}

function upBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.homing&&b.target&&b.target.hp>0){b.tx=b.target.x;b.ty=b.target.y;}
    const dx=b.tx-b.x,dy=b.ty-b.y,dist=Math.sqrt(dx*dx+dy*dy),spd=b.spd*gspeed;
    if(dist<spd+2){
      if(b.splash>0){
        const sr=b.splash*CELL;
        for(const e of enemies){const ex=e.x-b.tx,ey=e.y-b.ty;if(Math.sqrt(ex*ex+ey*ey)<=sr){e.hp-=b.dmg;if(b.slow){e.sf=1-b.slow;e.st=2;}}}
        spawnPs(b.tx,b.ty,b.color,12);
      }else if(b.target&&b.target.hp>0){
        b.target.hp-=b.dmg;if(b.slow){b.target.sf=1-b.slow;b.target.st=2;}
        spawnPs(b.tx,b.ty,b.color,5);
      }
      bullets.splice(i,1);
    }else{b.x+=dx/dist*spd;b.y+=dy/dist*spd;}
  }
}

function spawnPs(x,y,color,n){for(let i=0;i<n;i++)spawnP(x,y,color,3);}
function spawnP(x,y,color,size){const a=Math.random()*Math.PI*2,s=Math.random()*2+.5;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color,size,life:1});}
function upParts(dt){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.life-=dt*2*gspeed;p.x+=p.vx*gspeed;p.y+=p.vy*gspeed;if(p.life<=0)parts.splice(i,1);}}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // Grid
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.fillStyle=grid[r][c].walk?'#09152a':'#070d1e';
    ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
    ctx.strokeStyle='#0d2040';ctx.lineWidth=.5;
    ctx.strokeRect(c*CELL,r*CELL,CELL,CELL);
  }
  // Path
  if(path.length>1){
    ctx.beginPath();ctx.moveTo(path[0].x,path[0].y);
    for(let i=1;i<path.length;i++)ctx.lineTo(path[i].x,path[i].y);
    ctx.strokeStyle='#0d2242';ctx.lineWidth=CELL*.75;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    // Arrows
    for(let i=1;i<path.length;i++){
      const p=path[i-1],q=path[i],mx=(p.x+q.x)/2,my=(p.y+q.y)/2;
      const a=Math.atan2(q.y-p.y,q.x-p.x),s=CELL*.15;
      ctx.save();ctx.translate(mx,my);ctx.rotate(a);
      ctx.strokeStyle='#1e4a8a88';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-s,-s/1.5);ctx.lineTo(s,0);ctx.lineTo(-s,s/1.5);ctx.stroke();
      ctx.restore();
    }
  }
  // Range preview for selected tower
  if(selTower){
    const d=TDEFS[selTower.type];
    ctx.beginPath();ctx.arc(selTower.x,selTower.y,d.range*CELL,0,Math.PI*2);
    ctx.strokeStyle=d.color+'88';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=d.color+'11';ctx.fill();
  }
  // Towers
  for(const t of towers){
    const d=TDEFS[t.type],s=CELL*.42,x=t.x,y=t.y;
    ctx.fillStyle=t===selTower?'#0d2050':'#0a1830';
    ctx.strokeStyle=t===selTower?'#00ccff':d.color+'aa';
    ctx.lineWidth=t===selTower?2:1.5;
    ctx.beginPath();ctx.roundRect(x-s,y-s,s*2,s*2,4);ctx.fill();ctx.stroke();
    ctx.font=`${CELL*.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.emoji,x,y);
    if(t.laser){
      const e=t.laser;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(e.x,e.y);
      ctx.strokeStyle=d.color+'cc';ctx.lineWidth=2.5;ctx.stroke();
    }
  }
  // Enemies
  for(const e of enemies){
    const r=e.rad;
    if(e.st>0){ctx.fillStyle='#8ef4';ctx.beginPath();ctx.arc(e.x,e.y,r*1.1,0,Math.PI*2);ctx.fill();}
    ctx.font=`${r*1.8}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.emoji,e.x,e.y);
    const bw=r*2.2,bh=4,bx=e.x-bw/2,by=e.y-r-7;
    ctx.fillStyle='#200';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=e.hp/e.mhp>.5?'#4f4':e.hp/e.mhp>.25?'#ff4':'#f44';
    ctx.fillRect(bx,by,bw*Math.max(0,e.hp/e.mhp),bh);
  }
  // Bullets
  for(const b of bullets){
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.shadowBlur=8;ctx.shadowColor=b.color;ctx.fillStyle=b.color;ctx.fill();ctx.shadowBlur=0;
  }
  // Particles
  for(const p of parts){ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();}
  ctx.globalAlpha=1;
  // Placement preview
  if(selType&&mCol>=0&&mCol<COLS&&mRow>=0&&mRow<ROWS){
    const cell=grid[mRow][mCol],d=TDEFS[selType],x=mCol*CELL,y=mRow*CELL;
    const ok=!cell.walk&&!cell.tower;
    ctx.fillStyle=ok?(gold>=d.cost?d.color+'33':'#f4433633'):'#f4433622';
    ctx.strokeStyle=ok?(gold>=d.cost?d.color+'aa':'#f4433699'):'#f4433699';
    ctx.lineWidth=1.5;ctx.fillRect(x,y,CELL,CELL);ctx.strokeRect(x,y,CELL,CELL);
    if(ok){ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,d.range*CELL,0,Math.PI*2);ctx.strokeStyle=d.color+'44';ctx.lineWidth=1;ctx.stroke();}
  }
}

function endGame(won){
  dead=true;
  const ov=document.getElementById('ov');ov.classList.remove('h');
  ov.innerHTML=`<div class="ob"><div class="ot ${won?'w':'l'}">${won?'🎉 胜利！':'💀 失败'}</div><div class="os">${won?'成功抵御所有入侵！':'基地沦陷...'}<br>波次: ${wave}/${TOTAL} | 金币: ${gold}</div><button class="obtn" onclick="startGame()">再来一局</button></div>`;
}

function loop(ts){
  if(!started)return;
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  if(!dead){upEnemies(dt);upTowers(dt);upBullets(dt);upParts(dt);}
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('load',init);
</script>
</body>
</html>
